<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding Pass</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #d8d8d8;
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
            gap: 60px;
            padding: 40px 20px;
        }

        .ticket-container {
            width: 1100px;
            min-height: 280px;
            background: #e9e4d8;
            border-radius: 25px;
            display: flex;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        #ticketsContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        /* LEFT SECTION */

        .left {
            flex: 2;
            padding: 20px 25px;
            position: relative;
        }

        .top-bar {
            background: #4a2c2a;
            color: #d4af37;
            padding: 18px 18px;
            font-weight: 600;
            letter-spacing: 2px;
            border-top-left-radius: 25px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .top-bar .brand {
            position: absolute;
            left: 18px;
            color: #d4af37;
            font-weight: 700;
        }

        .top-bar .title {
            font-size: 16px;
            letter-spacing: 3px;
        }

        .top-bar span {
            font-size: 20px;
        }

        .passenger-name {
            margin-top: 10px;
        }

        .passenger-name h4 {
            font-size: 9px;
            letter-spacing: 1px;
            color: #7b6d63;
            margin-bottom: 3px;
        }

        .passenger-name h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #3b2a26;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .info-box h5 {
            font-size: 8px;
            letter-spacing: 0.5px;
            color: #7b6d63;
        }

        .info-box p {
            font-size: 12px;
            font-weight: 600;
            margin-top: 2px;
            color: #3b2a26;
        }

        /* DIVIDER */

        .divider {
            width: 2px;
            background: repeating-linear-gradient(to bottom,
                    transparent,
                    transparent 6px,
                    #bfb7a6 6px,
                    #bfb7a6 12px);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            width: 20px;
            height: 20px;
            background: #d8d8d8;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .divider::before {
            top: -10px;
        }

        .divider::after {
            bottom: -10px;
        }

        /* RIGHT SECTION */

        .right {
            flex: 1;
            padding: 20px 20px;
            position: relative;
        }

        .right .top-bar {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .top-bar .title {
            font-size: 14px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .top-bar .subtitle {
            font-size: 12px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .mini-details {
            margin-top: 10px;
        }

        .mini-details h4 {
            font-size: 9px;
            letter-spacing: 1px;
            color: #7b6d63;
        }

        .mini-details h2 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            margin: 2px 0 10px;
            color: #3b2a26;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .row div h5 {
            font-size: 8px;
            color: #7b6d63;
        }

        .row div p {
            font-weight: 600;
            margin-top: 2px;
            font-size: 11px;
            color: #3b2a26;
        }

        .barcode {
            margin-top: 10px;
            height: 35px;
            background: repeating-linear-gradient(to right,
                    #333,
                    #333 2px,
                    transparent 2px,
                    transparent 4px);
        }

        /* [ADDED] Passengers List Styles */
        .passengers-list {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #bfb7a6;
        }

        .passengers-list h5 {
            font-size: 8px;
            letter-spacing: 0.5px;
            color: #7b6d63;
            margin-bottom: 5px;
        }

        .passengers-list .passenger-item {
            font-size: 11px;
            font-weight: 500;
            color: #3b2a26;
            padding: 2px 0;
        }

        .passengers-list .passenger-item span {
            font-weight: 400;
            color: #7b6d63;
            font-size: 10px;
        }
    </style>
</head>

<body>

    <div id="ticketsContainer">
        <!-- Tickets generated dynamically per passenger -->
    </div>

    <script>
        // Helper: generate a single ticket HTML for a passenger
        function createTicketHTML(passenger, booking, entity, isHotel) {
            const pName = passenger.passenger_name.toUpperCase();
            const seat = passenger.seat_number || 'N/A';

            if (isHotel) {
                return `
                <div class="ticket-container">
                    <div class="left">
                        <div class="top-bar">
                            <span class="brand">Questlog</span>
                            <span class="title">HOTEL BOOKING</span>
                        </div>
                        <div class="passenger-name">
                            <h4>NAME OF GUEST</h4>
                            <h1>${pName}</h1>
                        </div>
                        <div class="info-grid">
                            <div class="info-box"><h5>PRICE</h5><p>$${booking.total_amount}</p></div>
                            <div class="info-box"><h5>HOTEL</h5><p>${entity.name}</p></div>
                            <div class="info-box"><h5>LOCATION</h5><p>${entity.location.split(',')[0]}</p></div>
                            <div class="info-box"><h5>CHECK-IN</h5><p>${booking.start_date}</p></div>
                            <div class="info-box"><h5>GUESTS</h5><p>${booking.guests_count}</p></div>
                            <div class="info-box"><h5>CHECK-OUT</h5><p>${booking.end_date}</p></div>
                            <div class="info-box"><h5>BOOKING ID</h5><p>#${booking.id}</p></div>
                            <div class="info-box"><h5>STATUS</h5><p>${booking.payment_status}</p></div>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="right">
                        <div class="top-bar">
                            <span class="title">HOTEL BOOKING</span>
                            <span class="subtitle">RESERVATION</span>
                        </div>
                        <div class="mini-details">
                            <h4>NAME OF GUEST</h4>
                            <h2>${pName}</h2>
                            <div class="row"><div><h5>LOCATION</h5><p>${entity.location.split(',')[0]}</p></div><div><h5>HOTEL</h5><p>${entity.name}</p></div></div>
                            <div class="row"><div><h5>DETAILS</h5><p>GUESTS: ${booking.guests_count}</p></div><div><h5>ID</h5><p>#${booking.id}</p></div></div>
                            <div class="row"><div><h5>DATE</h5><p>${booking.start_date}</p></div><div><h5>CHECK-OUT</h5><p>${booking.end_date}</p></div></div>
                            <div class="barcode"></div>
                        </div>
                    </div>
                </div>`;
            } else {
                return `
                <div class="ticket-container">
                    <div class="left">
                        <div class="top-bar">
                            <span class="brand">Questlog</span>
                            <span class="title">TRANSPORT BOOKING</span>
                        </div>
                        <div class="passenger-name">
                            <h4>NAME OF PASSENGER</h4>
                            <h1>${pName}</h1>
                        </div>
                        <div class="info-grid">
                            <div class="info-box"><h5>PRICE</h5><p>$${booking.total_amount}</p></div>
                            <div class="info-box"><h5>TYPE</h5><p>${entity.type.toUpperCase()}</p></div>
                            <div class="info-box"><h5>FROM</h5><p>${entity.source}</p></div>
                            <div class="info-box"><h5>DEPARTURE</h5><p>${entity.departure_time}</p></div>
                            <div class="info-box"><h5>TO</h5><p>${entity.destination}</p></div>
                            <div class="info-box"><h5>DATE</h5><p>${entity.departure_date}</p></div>
                            <div class="info-box"><h5>SEAT</h5><p>${seat}</p></div>
                            <div class="info-box"><h5>STATUS</h5><p>${booking.payment_status}</p></div>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="right">
                        <div class="top-bar">
                            <span class="title">TRANSPORT BOOKING</span>
                            <span class="subtitle">ECONOMY CLASS</span>
                        </div>
                        <div class="mini-details">
                            <h4>NAME OF PASSENGER</h4>
                            <h2>${pName}</h2>
                            <div class="row"><div><h5>FROM</h5><p>${entity.source}</p></div><div><h5>TO</h5><p>${entity.destination}</p></div></div>
                            <div class="row"><div><h5>${entity.type.toUpperCase()}</h5><p>${entity.type.toUpperCase()}</p></div><div><h5>SEAT</h5><p>${seat}</p></div></div>
                            <div class="row"><div><h5>DATE</h5><p>${entity.departure_date}</p></div><div><h5>TIME</h5><p>${entity.departure_time}</p></div></div>
                            <div class="barcode"></div>
                        </div>
                    </div>
                </div>`;
            }
        }

        async function loadTicket() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookingId = urlParams.get('booking_id');
            if (!bookingId) {
                alert('No booking ID provided');
                return;
            }

            try {
                const res = await fetch(`api/tourist/ticket.php?booking_id=${bookingId}`);
                const data = await res.json();

                if (data.success) {
                    const t = data.data;
                    const b = t.booking;
                    const e = t.entity;
                    const allPassengers = t.passengers || [];

                    if (b.booking_status !== 'Confirmed' && b.booking_status !== 'Completed') {
                        document.body.innerHTML = `<div style="text-align: center; font-family: 'Poppins', sans-serif; color: #ff6b6b; font-size: 1.5rem; margin-top: 20vh;">
                        <h2>Ticket Unavailable</h2>
                        <p>This booking is currently <strong>${b.booking_status}</strong>.</p>
                        <p>You can only view tickets for Confirmed bookings.</p>
                        <br><button onclick="window.close()" style="padding: 10px 20px; font-size: 1rem; cursor: pointer;">Close Window</button>
                    </div>`;
                        return;
                    }

                    // Filter out cancelled passengers — only confirmed get tickets
                    const confirmedPassengers = allPassengers.filter(p => p.passenger_status === 'Confirmed');

                    const isHotel = b.type === 'Hotel';
                    const container = document.getElementById('ticketsContainer');

                    if (confirmedPassengers.length > 0) {
                        // Generate one ticket per confirmed passenger
                        container.innerHTML = confirmedPassengers.map(p => createTicketHTML(p, b, e, isHotel)).join('');
                    } else {
                        // Fallback: no passengers recorded — use profile name
                        const profRes = await fetch('api/tourist/profile.php');
                        let fallbackName = 'GUEST';
                        if (profRes.ok) {
                            const profData = await profRes.json();
                            if (profData.data && profData.data.name) fallbackName = profData.data.name.toUpperCase();
                        }
                        const fallbackPassenger = { passenger_name: fallbackName, seat_number: 'N/A', passenger_status: 'Confirmed' };
                        container.innerHTML = createTicketHTML(fallbackPassenger, b, e, isHotel);
                    }

                    setTimeout(() => {
                        window.print();
                    }, 500);
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadTicket);
    </script>
</body>

</html>
