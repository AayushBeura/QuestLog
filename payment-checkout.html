<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestLog - Secure Checkout</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100vh;
            overflow: hidden;
        }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: url('assets/background_balitemple.png') no-repeat center center fixed !important;
            background-size: cover !important;
            color: #fff;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 12, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: -1;
        }

        .checkout-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(25, 25, 32, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(218, 165, 32, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(218, 165, 32, 0.1);
        }

        h1 {
            text-align: center;
            font-family: 'Bree Serif', serif;
            font-size: 2.8rem;
            margin-bottom: 40px;
            margin-top: 0;
            background: linear-gradient(135deg, #fff 0%, #daa520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.8));
        }

        .bill-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .summary-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(218, 165, 32, 0.2);
        }

        .summary-card h3 {
            font-family: 'Bree Serif', serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #daa520;
            border-bottom: 1px dashed rgba(218, 165, 32, 0.3);
            padding-bottom: 15px;
            margin-top: 0;
        }

        .summary-card p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .summary-card p strong {
            color: #daa520;
            font-weight: 500;
            display: inline-block;
            width: 100px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .total-row {
            border-top: 1px solid rgba(218, 165, 32, 0.4);
            padding-top: 20px;
            margin-top: 20px;
            font-weight: 600;
            font-size: 1.3rem;
            color: #daa520;
        }

        .payment-methods {
            margin-top: 30px;
        }

        .payment-methods h4 {
            font-family: 'Bree Serif', serif;
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .method-option {
            border: 1px solid rgba(218, 165, 32, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
        }

        .method-option:hover {
            border-color: #daa520;
            background: rgba(218, 165, 32, 0.1);
        }

        .method-option input {
            accent-color: #daa520;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .buttons-wrapper {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px 28px;
            width: 100%;
            background: linear-gradient(135deg, #daa520 0%, #b8860b 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.05rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(218, 165, 32, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-sizing: border-box;
        }

        .btn:hover {
            background: linear-gradient(135deg, #e8c547 0%, #daa520 100%);
            box-shadow: 0 8px 30px rgba(218, 165, 32, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: rgba(255,255,255,0.2) !important;
            color: #999 !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: not-allowed !important;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-cancel:hover {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.15);
        }

        @media (max-width: 768px) {
            .bill-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>Secure Checkout</h1>
        <div class="bill-details">
            <div class="summary-card" id="bookingInfo">
                <h3>Booking Details</h3>
                <p>Loading details...</p>
            </div>

            <div class="summary-card">
                <h3>Payment Summary</h3>
                <div id="priceBreakdown">
                    <div class="price-row"><span>Subtotal</span> <span id="subtotal">$0.00</span></div>
                    <div class="price-row"><span>CGST (6%)</span> <span id="cgst">$0.00</span></div>
                    <div class="price-row"><span>SGST (6%)</span> <span id="sgst">$0.00</span></div>
                    <div class="price-row"><span>Service Fee</span> <span id="serviceFee">$0.00</span></div>
                    <div class="total-row price-row"><span>Total Amount</span> <span id="totalAmount">$0.00</span></div>
                </div>

                <div class="payment-methods">
                    <h4>Select Payment Mode</h4>
                    <label class="method-option">
                        <input type="radio" name="payMethod" value="Credit Card" checked>
                        <span>Credit / Debit Card</span>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="payMethod" value="UPI">
                        <span>UPI / QR Code</span>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="payMethod" value="Net Banking">
                        <span>Net Banking</span>
                    </label>
                </div>

                <div class="buttons-wrapper">
                    <button class="btn" id="payBtn">Proceed to Pay</button>
                    <button class="btn btn-cancel" id="cancelBtn" onclick="window.location.href='tourist-dashboard.html#trips';">Back to Dashboard</button>
                </div>

                <!-- QR Container for UPI (Hidden by default) -->
                <div id="qr-container" style="display:none; text-align:center; padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius:15px; margin-top: 20px; border: 1px solid rgba(218, 165, 32, 0.3);">
                    <h3 style="font-family:'Bree Serif', serif; color:#daa520; margin-top:0;">Scan to Pay</h3>
                    <img id="qr-image" src="" width="200" style="border-radius:10px; margin: 10px 0;" />
                    <h4 id="qr-timer" style="color:rgba(255,255,255,0.9); margin-bottom: 5px;">Time left: 05:00</h4>
                    <p id="qr-status" style="font-size: 0.95rem; color: rgba(255,255,255,0.7); margin-top: 0;">Waiting for you to scan...</p>
                    <button class="btn btn-cancel" style="margin-top: 15px; padding: 10px;" id="cancelQrBtn">Cancel UPI</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('booking_id');

        if (!bookingId) {
            alert("Invalid access. No booking found.");
            window.location.href = 'tourist-dashboard.html';
        }

        async function loadDetails() {
            try {
                const res = await fetch(`api/tourist/ticket.php?booking_id=${bookingId}`);
                const data = await res.json();
                if (data.success) {
                    const b = data.data.booking;
                    const e = data.data.entity;
                    const p = data.data.price_breakdown;
                    
                    document.getElementById('bookingInfo').innerHTML = `
                        <h3>Booking Summary</h3>
                        <p><strong>Booking ID:</strong> #${b.id}</p>
                        <p><strong>Type:</strong> ${b.type}</p>
                        <p><strong>Name:</strong> ${e.name || e.type.toUpperCase()}</p>
                        <p><strong>Details:</strong> ${e.location || (e.source + ' to ' + e.destination)}</p>
                        <p><strong>Date:</strong> ${b.start_date || b.booking_date}</p>
                        <p><strong>Guests:</strong> ${b.guests_count}</p>
                        <p><strong>Status:</strong> <span style="color: ${b.payment_status === 'Completed' ? '#4cd137' : '#daa520'}">${b.payment_status}</span></p>
                    `;

                    document.getElementById('subtotal').textContent = `$${p.subtotal}`;
                    document.getElementById('cgst').textContent = `$${p.cgst}`;
                    document.getElementById('sgst').textContent = `$${p.sgst}`;
                    document.getElementById('serviceFee').textContent = `$${p.service_fee}`;
                    document.getElementById('totalAmount').textContent = `$${p.total_amount}`;

                    // Disable payment button if already paid
                    if (b.payment_status === 'Completed' || b.booking_status === 'Confirmed' || b.booking_status === 'Completed') {
                        document.getElementById('payBtn').textContent = 'Already Paid';
                        document.getElementById('payBtn').disabled = true;
                    } else if (b.booking_status === 'Cancelled') {
                        document.getElementById('payBtn').textContent = 'Booking Cancelled';
                        document.getElementById('payBtn').disabled = true;
                    }

                } else {
                    alert(data.message);
                    window.location.href = 'tourist-dashboard.html';
                }
            } catch (err) { console.error(err); }
        }

        let qrTimerInterval;

        document.getElementById('payBtn').addEventListener('click', async () => {
            const mode = document.querySelector('input[name="payMethod"]:checked').value;
            const totalAmountStr = document.getElementById('totalAmount').textContent;
            let totalAmount = 0;
            if(totalAmountStr.includes('$')) {
               totalAmount = parseFloat(totalAmountStr.replace('$', ''));
            } else {
               totalAmount = parseFloat(totalAmountStr);
            }

            if (mode === "UPI") {
                // Determine the host for node backend. Assume it runs on port 3000 locally.
                let nodeHost = window.location.hostname;
                if (!nodeHost || nodeHost === "") nodeHost = "localhost";
                
                document.getElementById('payBtn').style.display = 'none';
                document.getElementById('cancelBtn').style.display = 'none';
                document.getElementById('qr-container').style.display = 'block';
                document.getElementById('qr-status').innerText = "Generating QR Code...";
                document.getElementById('qr-image').style.display = 'none';

                try {
                    const res = await fetch(`http://${nodeHost}:3000/api/qr?amount=${totalAmount}&bookingId=${bookingId}`);
                    const data = await res.json();
                    
                    document.getElementById('qr-image').src = data.qr;
                    document.getElementById('qr-image').style.display = 'inline-block';
                    document.getElementById('qr-status').innerText = "Waiting for you to scan and pay...";
                    
                    const ws = new WebSocket(`ws://${nodeHost}:3000`);
                    ws.onopen = () => ws.send(data.sessionId);
                    
                    let timeLeft = 300;
                    document.getElementById('qr-timer').innerText = `Time left: 05:00`;
                    document.getElementById('qr-timer').style.color = "rgba(255,255,255,0.9)";
                    clearInterval(qrTimerInterval);

                    qrTimerInterval = setInterval(() => {
                        timeLeft--;
                        const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                        const s = String(timeLeft % 60).padStart(2, '0');
                        document.getElementById('qr-timer').innerText = `Time left: ${m}:${s}`;
                        
                        if (timeLeft <= 0) {
                            clearInterval(qrTimerInterval);
                            document.getElementById('qr-status').innerText = "Payment Unsuccessful - Time Expired";
                            document.getElementById('qr-status').style.color = "#ff6b6b";
                            resetPayButtons();
                        }
                    }, 1000);

                    ws.onmessage = async (msg) => {
                        if (msg.data === "confirmed") {
                            clearInterval(qrTimerInterval);
                            document.getElementById('qr-status').innerText = "Payment Successful ✅ Completing booking...";
                            document.getElementById('qr-status').style.color = "#4cd137";
                            ws.close();
                            await completePaymentBackend("UPI", totalAmount);
                        } else if (msg.data === "expired") {
                            clearInterval(qrTimerInterval);
                            document.getElementById('qr-status').innerText = "Payment Unsuccessful - Time Expired";
                            document.getElementById('qr-status').style.color = "#ff6b6b";
                            ws.close();
                            resetPayButtons();
                        }
                    }

                    document.getElementById('cancelQrBtn').onclick = () => {
                        clearInterval(qrTimerInterval);
                        ws.close();
                        document.getElementById('qr-container').style.display = 'none';
                        document.getElementById('payBtn').style.display = 'block';
                        document.getElementById('cancelBtn').style.display = 'block';
                    };
                } catch(e) {
                    console.error("Failed to fetch QR", e);
                    alert("Failed to connect to UPI service. Make sure server.js is running.");
                    resetPayButtons();
                }
            } else {
                await completePaymentBackend(mode, totalAmount);
            }
        });

        function resetPayButtons() {
            setTimeout(() => {
                document.getElementById('qr-container').style.display = 'none';
                document.getElementById('payBtn').style.display = 'block';
                document.getElementById('cancelBtn').style.display = 'block';
            }, 3000);
        }

        async function completePaymentBackend(mode, amount) {
            try {
                const res = await fetch('api/tourist/payment.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        booking_id: bookingId, 
                        payment_method: mode,
                        amount: amount 
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Payment Successful! Your ticket is now confirmed.");
                    window.location.href = `tourist-dashboard.html#trips`;
                } else {
                    alert(data.message);
                }
            } catch (err) { console.error(err); }
        }

        loadDetails();
    </script>
</body>
</html>
